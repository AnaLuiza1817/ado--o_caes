<!-- Formulário de Adoção de Cães -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="adocao.js" defer></script>
    <title>Formulário de Adoção de Cães</title>
</head>
<body>
    <h1>Formulário de Adoção de Cães</h1>
    <h3>Preencha o formulário abaixo para adotar um cãozinho!</h3>
    
    <form id="formAdocao">
        <input type="text" id="nome" placeholder="Nome completo">
        <input type="text" id="email" placeholder="Email">
        <input type="text" id="telefone" placeholder="Telefone">
        <input type="text" id="cpf" placeholder="CPF">
        <input type="number" id="idade" placeholder="Idade">
        <input type="text" id="cidade" placeholder="Cidade">

        <select id="moradia">
            <option value="">Tipo de moradia</option>
            <option value="casa">Casa</option>
            <option value="apartamento">Apartamento</option>
        </select>

        <select id="quintal">
            <option value="">Possui quintal?</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <select id="pet">
            <option value="">Já teve pet?</option>
            <option value="sim">Sim</option>
            <option value="nao">Não</option>
        </select>

        <input type="number" id="horas" placeholder="Horas sozinho">

        <select id="financeiro">
            <option value="">Condição financeira</option>
            <option value="boa">Boa</option>
            <option value="ruim">Ruim</option>
        </select>

        <select id="decisao">
            <option value="">Decisão de adoção</option>
            <option value="hoje">Hoje</option>
            <option value="planejado">Planejado</option>
        </select>
        <textarea id="motivo" placeholder="Motivo da adoção"></textarea>
        <label>
            <input type="checkbox" id="termo"> Aceito o termo
        </label>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
