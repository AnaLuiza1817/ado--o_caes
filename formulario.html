<!-- Formulário de Adoção de Cães -->
<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="adocao.js" defer></script>
    <title>Formulário de Adoção de Cães</title>
</head>

<body>
    <div class="container">
        <div class="card">
            <h1>Formulário de Adoção de Cães</h1>
            <p>Preencha o formulário abaixo para adotar um cãozinho!</p>

            <form>
                <div class="grid">
                    <input type="text" placeholder="Nome completo">
                    <input type="email" placeholder="Email">
                    <input type="text" placeholder="Telefone">
                    <input type="text" placeholder="CPF">
                    <input type="number" placeholder="Idade">
                    <input type="text" placeholder="Cidade">

                    <select>
                        <option>Tipo de moradia</option>
                    </select>

                    <select>
                        <option>Possui quintal?</option>
                    </select>

                    <select>
                        <option>Já teve pet?</option>
                    </select>

                    <input type="text" placeholder="Horas sozinho">

                    <select>
                        <option>Condição financeira</option>
                    </select>

                    <select>
                        <option>Decisão de adoção</option>
                    </select>
                </div>

                <textarea placeholder="Motivo da adoção"></textarea>

                <div class="actions">
                    <label>
                        <input type="checkbox"> Aceito os termos
                    </label>

                    <button type="submit">Enviar 🐾</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
